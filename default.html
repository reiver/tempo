	<p>
		<strong>Tempo</strong> is the <em>speed</em> or <em>pace</em> at which a piece of music is played or a given activity occurs.
	</p>
	<p>
		<strong>Tempo</strong> is typically measured in <strong>beats per ninute</strong> (<strong><abbr title="beats per ninute">BPM</abbr></strong>).
	</p>
